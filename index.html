  <script>
    function escapeAttr(s) {
      return String(s || '').replace(/"/g, '&quot;');
    }
    function safeParse(s) {
      try { return JSON.parse(s); } catch (e) { return null; }
    }
    function isItem(obj) {
      return obj && typeof obj === 'object' && ('title' in obj || 'video' in obj);
    }
    function getCategories() {
      const raw = localStorage.getItem('livehub_categories');
      if (!raw) return [];
      try { const arr = JSON.parse(raw); return Array.isArray(arr) ? arr : []; } catch { return []; }
    }
    function getProfilesMap() {
      const raw = localStorage.getItem('livehub_profiles');
      if (!raw) return {};
      try {
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return {};
        const map = {};
        arr.forEach(p => { if (p && p.name) map[p.name] = p.photo || ''; });
        return map;
      } catch (e) { return {}; }
    }
    async function getLiveContent() {
      try {
        const res = await fetch('/.netlify/functions/content', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data.items) && data.items.length > 0) return data.items;
        }
      } catch {}
      try {
        const raw = localStorage.getItem('livehub_content');
        const j = raw ? JSON.parse(raw) : null;
        if (j && Array.isArray(j.items) && j.items.length > 0) return j.items;
      } catch {}
      try {
        const v = localStorage.getItem('livehub_content_version') || String(Date.now());
        const res2 = await fetch('/assets/content.json?v=' + encodeURIComponent(v), { cache: 'no-store' });
        if (res2.ok) {
          const data2 = await res2.json();
          if (Array.isArray(data2.items)) return data2.items;
        }
      } catch {}
      return [];
    }
    function toEmbedUrl(url) {
      if (!url) return '';
      let u;
      try { u = new URL(url); } catch (e) { return url; }
      const host = (u.hostname || '').replace(/^www\./, '');
      if (host === 'youtu.be') {
        const vid = u.pathname.replace('/', '');
        return vid ? `https://www.youtube.com/embed/${vid}?modestbranding=1&rel=0&showinfo=0` : url;
      }
      if (host.endsWith('youtube.com')) {
        const vid = u.searchParams.get('v');
        if (vid) return `https://www.youtube.com/embed/${vid}?modestbranding=1&rel=0&showinfo=0`;
        const m = (u.pathname || '').match(/\/embed\/([A-Za-z0-9_-]+)/);
        if (m && m[1]) return `https://www.youtube.com/embed/${m[1]}?modestbranding=1&rel=0&showinfo=0`;
        return url;
      }
      if (host === 'drive.google.com') {
        const m = (u.pathname || '').match(/\/file\/d\/([^/]+)/);
        if (m && m[1]) return `https://drive.google.com/file/d/${m[1]}/preview`;
        const id = u.searchParams.get('id');
        if (id) return `https://drive.google.com/file/d/${id}/preview`;
        return url;
      }
      if (host.endsWith('vimeo.com')) {
        const m = (u.pathname || '').match(/\/(\d+)/);
        if (m && m[1]) return `https://player.vimeo.com/video/${m[1]}`;
        return url;
      }
      if (host.endsWith('dailymotion.com')) {
        const m = (u.pathname || '').match(/\/video\/([A-Za-z0-9]+)/);
        if (m && m[1]) return `https://www.dailymotion.com/embed/video/${m[1]}`;
        return url;
      }
      if (host.endsWith('pornhub.com')) {
        const key = u.searchParams.get('viewkey');
        if (key) return `https://www.pornhub.com/embed/${key}`;
        const m = (u.pathname || '').match(/\/embed\/([A-Za-z0-9_-]+)/);
        if (m && m[1]) return `https://www.pornhub.com/embed/${m[1]}`;
        return url;
      }
      if (host.endsWith('xvideos.com')) {
        const m = (u.pathname || '').match(/\/video(\d+)\//);
        if (m && m[1]) return `https://www.xvideos.com/embedframe/${m[1]}`;
        return url;
      }
      if (host.endsWith('xnxx.com')) {
        const m = (u.pathname || '').match(/\/video-([A-Za-z0-9]+)\//);
        if (m && m[1]) return `https://www.xnxx.com/embedframe/${m[1]}`;
        return url;
      }
      if (host.endsWith('xhamster.com')) {
        const m = (u.pathname || '').match(/\/videos\/.*?-([0-9]+)/);
        if (m && m[1]) return `https://xhamster.com/embed/${m[1]}`;
        return url;
      }
      return url;
    }
    
    function renderCategoryBar(items) {
      const bar = document.getElementById('categoryBar');
      if (!bar) return;
      const cats = getCategories();
      const extra = new Set();
      (items || []).forEach(it => {
        const c = String(it.category || '').trim();
        if (c && !cats.includes(c)) extra.add(c);
      });
      const allCats = ['All', ...cats, ...Array.from(extra)];
      bar.innerHTML = '';
      allCats.forEach(name => {
        const pill = document.createElement('button');
        pill.className = 'category-pill' + ((window.homeCategoryFilter || 'All') === name ? ' active' : '');
        pill.textContent = name;
        pill.addEventListener('click', () => { window.homeCategoryFilter = name; loadContent(); });
        bar.appendChild(pill);
      });
    }
    function renderMenuCategories(items) {
      const holder = document.getElementById('menuCategories');
      if (!holder) return;
      const cats = getCategories();
      const extra = new Set();
      (items || []).forEach(it => {
        const c = String(it.category || '').trim();
        if (c && !cats.includes(c)) extra.add(c);
      });
      const allCats = ['All', ...cats, ...Array.from(extra)];
      holder.innerHTML = '';
      allCats.forEach(name => {
        const a = document.createElement('a');
        a.className = 'nav-link';
        a.href = '/category.html?name=' + encodeURIComponent(name);
        a.textContent = name;
        holder.appendChild(a);
      });
    }
    async function loadContent() {
      const grid = document.getElementById('contentGrid');
      grid.innerHTML = '';
      let items = await getLiveContent();
      items = items.filter(v => v && v.title && (v.link || v.video));
      const selectedCat = window.homeCategoryFilter || 'All';
      if (selectedCat && selectedCat !== 'All') {
        items = items.filter(it => String(it.category || '') === selectedCat);
      }
      const q = (window.homeSearchQuery || '').toLowerCase();
      if (q) {
        items = items.filter(it => (
          String(it.title||'').toLowerCase().includes(q) ||
          String(it.profile||'').toLowerCase().includes(q) ||
          String(it.category||'').toLowerCase().includes(q)
        ));
      }
      if (items.length === 0) {
        grid.innerHTML = '<div class="text-center text-muted py-5">No videos uploaded yet</div>';
        return;
      }
      renderCategoryBar(items);
      renderMenuCategories(items);
      const placeholder = 'data:image/svg+xml;charset=UTF-8,%3Csvg xmlns%3D%22http%3A//www.w3.org/2000/svg%22 width%3D%221280%22 height%3D%22720%22 viewBox%3D%220 0 1280 720%22%3E%3Crect width%3D%22100%25%22 height%3D%22100%25%22 fill%3D%22%23eeeeee%22/%3E%3Ctext x%3D%2250%25%22 y%3D%2250%25%22 dominant-baseline%3D%22middle%22 text-anchor%3D%22middle%22 fill%3D%22%23000%22 font-family%3D%22Arial%2C%20sans-serif%22 font-size%3D%2242%22%3ELIVE HUB%3C/text%3E%3C/svg%3E';
      const groups = {};
      const ungrouped = [];
      items.forEach(it => {
        const p = String(it.profile || '').trim();
        if (p) {
          if (!groups[p]) groups[p] = [];
          groups[p].push(it);
        } else {
          ungrouped.push(it);
        }
      });
      const profiles = Object.keys(groups);
      if (profiles.length === 0 && ungrouped.length === 0) {
        grid.innerHTML = '<div class="text-center text-muted py-5">No videos uploaded yet</div>';
        return;
      }
      const profilesMap = getProfilesMap();
      profiles.forEach(profile => {
        const section = document.createElement('section');
        section.className = 'mb-4';
        const count = (groups[profile] || []).length;
        const photo = profilesMap[profile] || '';
        const avatar = photo ? `<img src="${photo}" alt="${escapeAttr(profile)}" class="profile-avatar">` : `<span class="avatar"></span>`;
        section.innerHTML = `
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2">
              ${avatar}
              <h2 class="h5 mb-0"><a href="/profile.html?name=${encodeURIComponent(profile)}">${escapeAttr(profile)}</a> <span class="small text-muted">(${count} ${count===1?'video':'videos'})</span></h2>
            </div>
            <a class="small" href="/category.html?name=${encodeURIComponent(window.homeCategoryFilter || 'All')}">View Category</a>
          </div>
          <div class="row g-3"></div>
        `;
        const row = section.querySelector('.row');
        groups[profile].forEach(item => {
          const col = document.createElement('div');
          col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';
          const imgSrc = item.thumbnail || placeholder;
          const id = item.id != null ? String(item.id) : '';
          const duration = item.duration || '';
          const createdAt = item.createdAt ? Number(item.createdAt) : null;
          function timeAgo(ts){
            if (!ts) return '';
            const diff = Math.floor((Date.now() - ts)/1000);
            const d = Math.floor(diff/86400); if (d>0) return `${d} day${d>1?'s':''} ago`;
            const h = Math.floor(diff/3600); if (h>0) return `${h} hour${h>1?'s':''} ago`;
            const m = Math.floor(diff/60); if (m>0) return `${m} minute${m>1?'s':''} ago`;
            return 'just now';
          }
          col.innerHTML = `
            <div class="card h-100">
              <a href="/video.html?id=${encodeURIComponent(id)}" class="card-img-top-wrap d-block">
                <img src="${imgSrc}" class="card-img-top" alt="${escapeAttr(item.title)}">
                <div class="thumb-gradient"></div>
                ${duration ? `<span class="duration-badge">${escapeAttr(duration)}</span>` : ''}
                <div class="play-icon">▶</div>
              </a>
              <div class="card-body d-flex flex-column">
                <h5 class="card-title"><a href="/video.html?id=${encodeURIComponent(id)}">${item.title || ''}</a></h5>
                <p class="card-text flex-grow-1"><a href="/profile.html?name=${encodeURIComponent(profile)}">${escapeAttr(profile)}</a></p>
                <div class="small text-muted">${createdAt ? timeAgo(createdAt) : ''}</div>
              </div>
            </div>
          `;
          row.appendChild(col);
        });
        grid.appendChild(section);
      });
      if (ungrouped.length > 0) {
        const section = document.createElement('section');
        section.className = 'mb-4';
        const row = document.createElement('div');
        row.className = 'row g-3';
        ungrouped.forEach(item => {
          const col = document.createElement('div');
          col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';
          const imgSrc = item.thumbnail || placeholder;
          const id = item.id != null ? String(item.id) : '';
          const duration = item.duration || '';
          col.innerHTML = `
            <div class="card h-100">
              <a href="/video.html?id=${encodeURIComponent(id)}" class="card-img-top-wrap d-block">
                <img src="${imgSrc}" class="card-img-top" alt="${escapeAttr(item.title)}">
                <div class="thumb-gradient"></div>
                ${duration ? `<span class="duration-badge">${escapeAttr(duration)}</span>` : ''}
                <div class="play-icon">▶</div>
              </a>
              <div class="card-body d-flex flex-column">
                <h5 class="card-title"><a href="/video.html?id=${encodeURIComponent(id)}">${item.title || ''}</a></h5>
                <p class="card-text flex-grow-1"></p>
              </div>
            </div>
          `;
          row.appendChild(col);
        });
        section.appendChild(row);
        grid.appendChild(section);
      }
    }
    window.addEventListener('storage', (e) => {
      if (e.key === 'livehub_content' || e.key === 'livehub_profiles' || e.key === 'livehub_categories' || e.key === 'livehub_content_version') loadContent();
    });
    const initialQ = (new URL(window.location.href)).searchParams.get('q') || '';
    if (initialQ) { window.homeSearchQuery = initialQ; const si0 = document.getElementById('searchInput'); if (si0) si0.value = initialQ; }
    loadContent();
    window.addEventListener('storage', (e) => {
      if (e.key === 'livehub_content' || e.key === 'livehub_profiles') {
        loadContent();
      }
    });
    const si = document.getElementById('searchInput');
    if (si) {
      si.addEventListener('input', () => { window.homeSearchQuery = si.value; loadContent(); });
      si.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const q = si.value.trim();
          if (q) {
            const url = new URL(window.location.href);
            url.searchParams.set('q', q);
            history.replaceState(null, '', url.toString());
            window.homeSearchQuery = q;
            loadContent();
          }
        }
      });
    }
    (function ageGateInit(){
      function shouldShow() {
        try {
          const raw = localStorage.getItem('age_gate');
          if (raw) {
            const j = JSON.parse(raw);
            if (j && j.accepted && j.exp && Number(j.exp) > Date.now()) return false;
          }
        } catch {}
        if (sessionStorage.getItem('age_session') === 'accepted') return false;
        return true;
      }
      const modalEl = document.getElementById('ageGateModal');
      if (!modalEl) return;
      const hasBootstrap = (typeof window !== 'undefined' && window.bootstrap && window.bootstrap.Modal);
      const modal = hasBootstrap ? new window.bootstrap.Modal(modalEl) : null;
      function showModal(){
        if (hasBootstrap && modal) modal.show();
        else {
          modalEl.classList.add('show');
          modalEl.style.display = 'block';
          modalEl.setAttribute('aria-modal','true');
          modalEl.removeAttribute('aria-hidden');
        }
      }
      function hideModal(){
        if (hasBootstrap && modal) modal.hide();
        else {
          modalEl.classList.remove('show');
          modalEl.style.display = 'none';
          modalEl.setAttribute('aria-hidden','true');
          modalEl.removeAttribute('aria-modal');
        }
      }
      if (shouldShow()) showModal();
      const overBtn = document.getElementById('ageGateOver');
      const underBtn = document.getElementById('ageGateUnder');
      const rememberEl = document.getElementById('ageGateRemember');
      if (overBtn) {
        overBtn.addEventListener('click', () => {
          if (rememberEl && rememberEl.checked) {
            const exp = Date.now() + 30*24*60*60*1000;
            localStorage.setItem('age_gate', JSON.stringify({ accepted: true, exp }));
          } else {
            sessionStorage.setItem('age_session', 'accepted');
          }
          hideModal();
        });
      }
      if (underBtn) {
        underBtn.addEventListener('click', () => {
          window.location.href = '/about.html?age=denied';
        });
      }
    })();
  </script>
