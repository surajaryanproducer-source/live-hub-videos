<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIVE HUB - Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/local-overrides.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-primary navbar-light">
    <div class="container align-items-center">
      <a class="navbar-brand me-2" href="/">LIVE HUB</a>
      <div class="header-search flex-grow-1 px-2">
        <input id="searchInput" type="search" class="form-control" placeholder="Search title, profile or category">
      </div>
      <button class="btn btn-outline-secondary ms-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mainMenuOffcanvas" aria-controls="mainMenuOffcanvas">Menu</button>
    </div>
  </nav>
  <div class="offcanvas offcanvas-end" tabindex="-1" id="mainMenuOffcanvas" aria-labelledby="mainMenuLabel">
    <div class="offcanvas-header">
      <h5 id="mainMenuLabel">Menu</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <div class="mb-3">
        <a class="nav-link" href="/terms.html">Terms &amp; Conditions</a>
        <a class="nav-link" href="/about.html">About</a>
      </div>
      <div id="menuCategories" class="navbar-nav flex-column gap-1"></div>
    </div>
  </div>
  <main class="container py-4">
    <div class="profile-banner mb-4">
      <div class="d-flex align-items-center gap-3">
        <img id="profileAvatar" class="profile-avatar-lg" alt="" style="display:none;">
        <div>
          <h1 id="profileTitle" class="h4 mb-1"></h1>
          <div id="profileCount" class="small text-muted"></div>
        </div>
      </div>
    </div>
    <div id="profileGrid" class="row g-3"></div>
  </main>
  <footer class="footer py-4">
    <div class="container text-center">
      <small><a href="/terms.html">Terms &amp; Conditions</a> • <a href="/about.html">About</a> • © LIVE HUB</small>
    </div>
  </footer>
  <script>
    function safeParse(s){ try{ return JSON.parse(s) } catch (e) { return null } }
    function isItem(obj){ return obj && typeof obj === 'object' && ('title' in obj || 'link' in obj || 'video' in obj) }
    async function getLiveContent(){
      try {
        const res = await fetch('/.netlify/functions/content', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data.items) && data.items.length > 0) return data.items;
        }
      } catch {}
      try {
        const raw = localStorage.getItem('livehub_content');
        const j = raw ? safeParse(raw) : null;
        if (j && Array.isArray(j.items) && j.items.length > 0) return j.items;
      } catch {}
      try {
        const v = localStorage.getItem('livehub_content_version') || String(Date.now());
        const res2 = await fetch('/assets/content.json?v=' + encodeURIComponent(v), { cache: 'no-store' });
        if (res2.ok) {
          const data2 = await res2.json();
          if (Array.isArray(data2.items)) return data2.items;
        }
      } catch {}
      return [];
    }
    function getProfilesMap() {
      const raw = localStorage.getItem('livehub_profiles');
      if (!raw) return {};
      try {
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return {};
        const map = {};
        arr.forEach(p => { if (p && p.name) map[p.name] = p.photo || ''; });
        return map;
      } catch (e) { return {}; }
    }
    function getParam(name){ const u = new URL(window.location.href); return u.searchParams.get(name) }
    async function render(){
      const name = getParam('name') || '';
      document.getElementById('profileTitle').textContent = name || 'Profile';
      const grid = document.getElementById('profileGrid');
      grid.innerHTML = '';
      let items = (await getLiveContent()).filter(it => String(it.profile || '') === name);
      const countEl = document.getElementById('profileCount');
      countEl.textContent = `${items.length} ${items.length===1?'video':'videos'}`;
      const avatarEl = document.getElementById('profileAvatar');
      const photo = getProfilesMap()[name] || '';
      if (photo) {
        avatarEl.src = photo;
        avatarEl.style.display = 'block';
      } else {
        avatarEl.style.display = 'none';
      }
      if (items.length === 0) {
        grid.innerHTML = '<div class="text-center text-muted py-5">No videos yet</div>';
      } else {
        items.forEach(item => addCard(item));
      }
      function escapeAttr(s){ return String(s||'').replace(/"/g,'&quot;') }
      function addCard(item){
        const col = document.createElement('div');
        col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';
        const imgSrc = item.thumbnail || item.image || 'data:image/svg+xml;charset=UTF-8,%3Csvg xmlns%3D%22http%3A//www.w3.org/2000/svg%22 width%3D%22640%22 height%3D%23360%22 viewBox%3D%220 0 640 360%22%3E%3Crect width%3D%22100%25%22 height%3D%22100%25%22 fill%3D%22%23eeeeee%22/%3E%3Ctext x%3D%2250%25%22 y%3D%2250%25%22 dominant-baseline%3D%22middle%22 text-anchor%3D%22middle%22 fill%3D%22%23000%22 font-family%3D%22Arial%2C%20sans-serif%22 font-size%3D%2222%22%3ELIVE HUB%3C/text%3E%3C/svg%3E';
        const id = item.id != null ? String(item.id) : '';
        const duration = item.duration || '';
        col.innerHTML = `
          <div class="card h-100">
            <a href="/video.html?id=${encodeURIComponent(id)}" class="card-img-top-wrap d-block">
              <img src="${imgSrc}" class="card-img-top" alt="${escapeAttr(item.title)}">
              <div class="thumb-gradient"></div>
              ${duration ? `<span class="duration-badge">${escapeAttr(duration)}</span>` : ''}
            </a>
            <div class="card-body d-flex flex-column">
              <h5 class="card-title"><a href="/video.html?id=${encodeURIComponent(id)}">${item.title || ''}</a></h5>
              <p class="card-text flex-grow-1"><a href="/profile.html?name=${encodeURIComponent(name)}">${escapeAttr(name)}</a></p>
            </div>
          </div>
        `;
        grid.appendChild(col);
      }
    }
    render();
    window.addEventListener('storage', (e) => {
      if (e.key === 'livehub_content' || e.key === 'livehub_profiles') render();
    });
    (function setupSearch(){
      const si = document.getElementById('searchInput');
      if (!si) return;
      si.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const q = si.value.trim();
          window.location.href = '/index.html?q=' + encodeURIComponent(q);
        }
      });
    })();
    (function renderMenuCategories(){
      const holder = document.getElementById('menuCategories');
      if (!holder) return;
      const raw = localStorage.getItem('livehub_categories');
      let cats = [];
      try { const arr = JSON.parse(raw); cats = Array.isArray(arr) ? arr : []; } catch {}
      holder.innerHTML = '';
      ['All', ...cats].forEach(name => {
        const a = document.createElement('a');
        a.className = 'nav-link';
        a.href = '/category.html?name=' + encodeURIComponent(name);
        a.textContent = name;
        holder.appendChild(a);
      });
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
